<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard Premium</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0 }

/* HEADER */
header {
  background:#2d3436;
  color:#fff;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

/* CONTAINER */
.container {
  padding:20px;
}

/* CARD */
.card {
  background:#fff;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  padding:10px;
  border-bottom:1px solid #ddd;
}

th {
  background:#eee;
}

/* BUTTON */
.btn {
  padding:6px 12px;
  border:none;
  cursor:pointer;
  border-radius:5px;
}

.btn-success { background:#00b894; color:#fff }
.btn-danger { background:#d63031; color:#fff }

/* STATUS */
.pending { background:#fff3cd }
.completed { background:#d4edda }
.cancelled { background:#f8d7da }

</style>
</head>

<body>

<header>
  <h2>📊 Dashboard Admin</h2>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <!-- INCOMING -->
  <div class="card">
    <h2>⚡ Transaksi Masuk (Pending)</h2>
    <table>
      <thead>
        <tr>
          <th>Order</th>
          <th>Produk</th>
          <th>Nama</th>
          <th>Total</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="incomingBody">
        <tr><td colspan="5">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- HISTORY -->
  <div class="card">
    <h2>📚 Riwayat Transaksi</h2>
    <table>
      <thead>
        <tr>
          <th>Order</th>
          <th>Produk</th>
          <th>Nama</th>
          <th>Total</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="historyBody">
        <tr><td colspan="5">Loading...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>

const API_URL = "https://payment-worker.namecheapel.workers.dev";

let lastPending = 0;

// AUTH CHECK
const token = localStorage.getItem("adminToken");
if(!token){
  window.location.href = "index.html";
}

// FETCH WITH AUTH
async function fetchAuth(url, options={}){
  const res = await fetch(url, {
    ...options,
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    }
  });

  if(res.status === 401){
    localStorage.removeItem("adminToken");
    location.href="index.html";
  }

  return res;
}

// LOAD DATA
async function loadTransactions(){
  try{
    const res = await fetchAuth(`${API_URL}/api/admin/transactions`);
    const data = await res.json();

    if(data.success){
      const all = data.transactions || [];

      const pending = all.filter(x=>x.status==="pending");
      const history = all.filter(x=>x.status!=="pending");

      renderIncoming(pending);
      renderHistory(history);
    }

  }catch(err){
    console.error(err);
  }
}

// RENDER INCOMING
function renderIncoming(data){
  const el = document.getElementById("incomingBody");

  // 🔊 AUDIO NOTIF
  if(data.length > lastPending){
    new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
  }
  lastPending = data.length;

  if(!data.length){
    el.innerHTML = `<tr><td colspan="5">Tidak ada transaksi</td></tr>`;
    return;
  }

  el.innerHTML = data.map(tr=>`
    <tr class="pending">
      <td>${tr.order_id}</td>
      <td>${tr.product_name}</td>
      <td>${tr.customer_name}</td>
      <td>Rp ${tr.amount.toLocaleString()}</td>
      <td>
        <button class="btn btn-success" onclick="approve('${tr.id}')">Paid</button>
        <button class="btn btn-danger" onclick="reject('${tr.id}')">Unpaid</button>
      </td>
    </tr>
  `).join('');
}

// RENDER HISTORY
function renderHistory(data){
  const el = document.getElementById("historyBody");

  if(!data.length){
    el.innerHTML = `<tr><td colspan="5">Belum ada data</td></tr>`;
    return;
  }

  el.innerHTML = data.map(tr=>`
    <tr class="${tr.status}">
      <td>${tr.order_id}</td>
      <td>${tr.product_name}</td>
      <td>${tr.customer_name}</td>
      <td>Rp ${tr.amount.toLocaleString()}</td>
      <td>${tr.status}</td>
    </tr>
  `).join('');
}

// APPROVE
async function approve(id){
  await updateStatus(id,"completed","paid");
}

// REJECT
async function reject(id){
  await updateStatus(id,"cancelled","unpaid");
}

// UPDATE STATUS
async function updateStatus(id,status,payment){
  try{
    const res = await fetchAuth(`${API_URL}/api/admin/transactions/${id}/status`,{
      method:"PUT",
      body:JSON.stringify({
        status:status,
        payment_status:payment
      })
    });

    if(res.ok){
      loadTransactions();
    }else{
      alert("Gagal update");
    }

  }catch(err){
    alert("Server error");
  }
}

// AUTO REFRESH
setInterval(loadTransactions, 5000);

// LOAD FIRST
loadTransactions();

// LOGOUT
function logout(){
  localStorage.removeItem("adminToken");
  location.href="index.html";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN PANEL</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0 }

header {
  background:#111827;
  color:#fff;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
}

header button {
  background:#ef4444;
  border:none;
  color:#fff;
  padding:8px 14px;
  cursor:pointer;
  border-radius:6px;
}

.container { padding:20px }

.stats {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  margin-bottom:20px;
}

.stat-card {
  background:#fff;
  padding:15px;
  border-radius:10px;
}

.stat-card p {
  font-size:20px;
  font-weight:bold;
}

.card {
  background:#fff;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  padding:10px;
  border-bottom:1px solid #eee;
}

th { background:#f1f1f1 }

.btn {
  padding:6px 10px;
  border:none;
  cursor:pointer;
  border-radius:5px;
}

.btn-success { background:#10b981; color:#fff }
.btn-danger { background:#ef4444; color:#fff }

.pending { background:#fef3c7 }
.completed { background:#d1fae5 }
.cancelled { background:#fee2e2 }

input {
  padding:8px;
  width:250px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<header>
  <h2>ADMIN PANEL</h2>
  <div>
    <button onclick="loadTransactions()">🔄 Refresh</button>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<div class="container">

<div class="stats">
  <div class="stat-card">
    <h4>Total</h4>
    <p id="totalTx">0</p>
  </div>
  <div class="stat-card">
    <h4>Pending</h4>
    <p id="pendingTx">0</p>
  </div>
  <div class="stat-card">
    <h4>Paid</h4>
    <p id="paidTx">0</p>
  </div>
  <div class="stat-card">
    <h4>Revenue</h4>
    <p id="revenue">Rp 0</p>
  </div>
</div>

<!-- PENDING -->
<div class="card">
  <h3>Transaksi Masuk</h3>
  <input type="text" id="searchPending" placeholder="Cari..." onkeyup="filterPending()">
  <table>
    <thead>
      <tr>
        <th>Order</th>
        <th>Produk</th>
        <th>Nama</th>
        <th>Alamat</th>
        <th>Email</th>
        <th>No HP</th>
        <th>Total</th>
        <th>Aksi</th>
      </tr>
    </thead>
    <tbody id="incomingBody"></tbody>
  </table>
</div>

<!-- HISTORY -->
<div class="card">
  <h3>📚 Riwayat</h3>
  <input type="text" id="searchHistory" placeholder="Cari..." onkeyup="filterHistory()">
  <table>
    <thead>
      <tr>
        <th>Tanggal</th>
        <th>Order</th>
        <th>Produk</th>
        <th>Nama</th>
        <th>Alamat</th>
        <th>Email</th>
        <th>No HP</th>
        <th>Total</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="historyBody"></tbody>
  </table>
</div>

</div>

<script>
const API_URL = "https://payment-worker.namecheapel.workers.dev";
let lastPending = 0;
let pendingData = [];
let historyData = [];

const token = localStorage.getItem("adminToken");
if(!token){
  location.href="index.html";
}

async function fetchAuth(url, options={}){
  const res = await fetch(url,{
    ...options,
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    }
  });

  if(res.status===401){
    localStorage.removeItem("adminToken");
    location.href="index.html";
  }

  return res;
}

function formatDate(dateStr){
  if(!dateStr) return '-';

  const d = new Date(dateStr);

  return new Intl.DateTimeFormat('id-ID', {
    timeZone: 'Asia/Jakarta',
    day: '2-digit',
    month: '2-digit',
    year: 'numeric',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit'
  }).format(d);
}

// LOAD
async function loadTransactions(){
  try{
    const res = await fetchAuth(`${API_URL}/api/admin/transactions`);
    const data = await res.json();

    if(data.success){
      const all = data.transactions || [];

      pendingData = all.filter(x=>x.status==="pending");
      historyData = all.filter(x=>x.status!=="pending");

      renderStats(all);
      renderIncoming(pendingData);
      renderHistory(historyData);
    }

  }catch(err){
    console.error(err);
  }
}

// STATS
function renderStats(all){
  document.getElementById("totalTx").innerText = all.length;
  document.getElementById("pendingTx").innerText = pendingData.length;
  document.getElementById("paidTx").innerText = all.filter(x=>x.payment_status==="paid").length;

  let revenue = all
    .filter(x=>x.payment_status==="paid")
    .reduce((sum,x)=>sum + Number(x.amount),0);

  document.getElementById("revenue").innerText = "Rp "+revenue.toLocaleString();
}

// PENDING
function renderIncoming(data){
  const el = document.getElementById("incomingBody");

  // Ambil ID transaksi sekarang
  const currentIds = new Set(data.map(tr => tr.id));

  // Cek apakah ada ID baru (yang belum pernah ada)
  let hasNew = false;
  let firstLoad = true;

  data.forEach(tr => {
    if(!knownPendingIds.has(tr.id)){
      newTransactions.push(tr);
    }
  });

  // 🔊 Bunyi hanya kalau ada transaksi BARU
  if(newTransactions.length > 0 && !firstLoad){
    new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();

    newTransactions.forEach(tr=>{
      showNotif(
        "🛒 Transaksi Baru",
        `${tr.customer_name} beli ${tr.product_name} (Rp ${Number(tr.amount).toLocaleString()})`
      );
    });
  }
firstLoad = false;
  knownPendingIds = currentIds;

  // render table
  if(!data.length){
    el.innerHTML = `<tr><td colspan="8">Tidak ada transaksi</td></tr>`;
    return;
  }

  el.innerHTML = data.map(tr=>`
    <tr class="pending">
      <td>${tr.order_id}</td>
      <td>${tr.product_name}</td>
      <td>${tr.customer_name}</td>
      <td>${tr.shipping_address || '-'}</td>
      <td>${tr.customer_email || '-'}</td>
      <td>${tr.customer_phone || '-'}</td>
      <td>Rp ${Number(tr.amount).toLocaleString()}</td>
      <td>
        <button class="btn btn-success" onclick="approve('${tr.id}')">Paid</button>
        <button class="btn btn-danger" onclick="reject('${tr.id}')">Unpaid</button>
      </td>
    </tr>
  `).join('');
}

// HISTORY
function renderHistory(data){
  const el = document.getElementById("historyBody");

  if(!data.length){
    el.innerHTML = `<tr><td colspan="9">Belum ada data</td></tr>`;
    return;
  }

  el.innerHTML = data.map(tr=>`
    <tr class="${tr.status}">
      <td>${formatDate(tr.created_at || tr.order_date)}</td>
      <td>${tr.order_id}</td>
      <td>${tr.product_name}</td>
      <td>${tr.customer_name}</td>
      <td>${tr.shipping_address || '-'}</td>
      <td>${tr.customer_email || '-'}</td>
      <td>${tr.customer_phone || '-'}</td>
      <td>Rp ${Number(tr.amount).toLocaleString()}</td>
      <td>${tr.payment_status || tr.status}</td>
    </tr>
  `).join('');
}

// FILTER
function filterPending(){
  const q = document.getElementById("searchPending").value.toLowerCase();
  renderIncoming(pendingData.filter(x =>
    x.product_name.toLowerCase().includes(q) ||
    x.customer_name.toLowerCase().includes(q)
  ));
}

function filterHistory(){
  const q = document.getElementById("searchHistory").value.toLowerCase();
  renderHistory(historyData.filter(x =>
    x.product_name.toLowerCase().includes(q) ||
    x.customer_name.toLowerCase().includes(q)
  ));
}

// UPDATE STATUS
async function updateStatus(id,status,payment){
  try{
    await fetchAuth(`${API_URL}/api/admin/transactions/${id}/status`,{
      method:"PUT",
      body:JSON.stringify({status,payment_status:payment})
    });
    loadTransactions();
  }catch{
    alert("Server error");
  }
}

function approve(id){ updateStatus(id,"completed","paid"); }
function reject(id){ updateStatus(id,"cancelled","unpaid"); }

// AUTO REFRESH
setInterval(loadTransactions, 5000);
loadTransactions();

function logout(){
  localStorage.removeItem("adminToken");
  location.href="index.html";
}
</script>

</body>
</html>
